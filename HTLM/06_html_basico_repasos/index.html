<!DOCTYPE html>
<html>
    <head>
        <title> Mi Web</title>
        <meta charset="UTF-8">
        <style>
            body {
                background-color: #f0f0f0;
                font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
                margin: 0;
                
            }
            p {
                color: gray;
            }
            .caja {
                transition: 0.3s;
                background-color: ghostwhite;
                border-radius: 10px;
                width: 300px;
                padding: 20px;
                text-align: center;
                margin:50px auto;
                box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);
                
            }
            .caja:hover {
                transform: scale(1.05);
                box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
            }
            .contenedor {
               display: flex; 
               justify-content: center;
               gap: 20px;    
            }
            .caja img{
                width: 90%;
                border-radius: 10px;
            }
            a {
                display: inline-block;
                margin-top: 10px;
                text-decoration: none;
                color: white;
                background-color: #007BFF;
                padding: 8px 15px;
                border-radius: 5px;
                transition: 0.3s;

            }
            a:hover {
                background-color: #0056b3;
            }

            
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="caja">
                <img src="IT.png" alt="Foto IT">
                <h1>Mario Lorenzo</h1>
                <p>Estoy aprendiendo HTML</p>
                <a href="https://google.com">Pulsa para ir a google</a>
               
            </div>
        </div>
    </body>
</html>
