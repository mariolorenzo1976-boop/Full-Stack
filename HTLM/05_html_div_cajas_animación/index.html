<!DOCTYPE html>
<html>
    <head>
        <title>Mi web</title>
        <meta charset="UTF-8">
        
        <style>
            body{
                background-color: #f0f0f0;
                font-family: Arial, Helvetica, sans-serif;
            }
            .caja{
                transition: 0.3s;
                background-color: white;
                border-radius: 10px;
                padding: 20px;
                width: 300px;
                text-align: center;
                box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            } 
            .caja:hover { 
                transform: scale(1.05);
                box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
            }
            .contenedor{
                display: flex;
                justify-content: center;
                gap: 20px;
            }
        </style>
            <!--margin: 50px margen arriba/abajo , auto centra la caja horizontal -->

    </head>
    <body>
        <div class="contenedor">
            <div class="caja">Caja 1
                 <h2>Mario XC</h2>
                 <p>Specialized Turbo Levo</p>
            </div>
            <div class="caja">Caja 2
                 <h2>Terreno</h2>
                 <p>Volcanico/Polvo/Pista</p>
            </div>
            <div class="caja">Caja 3
                 <h2>Objetivo</h2>
                 <p>Mejorar Técnica/Rendimiento</p>
            </div>
        </div>
       
    
    </body>
</html>
