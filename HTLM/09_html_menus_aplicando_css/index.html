<!DOCTYPE html>
<html>
    <head>
        <title>Mi primer menú</title>
        <meta charset="UTF-8">
        <style>
            nav {
                background-color: #333;
            }
            ul {
                list-style: none; /* quita los puntos*/
                height: 60px;
                padding: 0;
                margin: 0;
                display: flex;
                background-color: #333;
            }
            li {
                list-style: none;
                display: flex;
            }
            a {
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                text-align: center;
                align-items: center;
                justify-content: center;
                display: flex;
                padding: 10px 90px;
                color: white;
                text-decoration: none;
            }
            a:hover {
                background-color: #555;
            }
            a {
                font-weight: bold;
            }

        </style>

    </head>
    <body>
         <nav> <!--#indica que es navegación -->
            <ul>  <!-- es un lista -->
                <li><a href="https://google.com">Inicio</a></li> <!--cada opción con su enlace correspondiente -->
                <li><a href="#">Servicios</a></li>
                <li><a href="#">Sobre nosotros</a></li>
                <li><a href="#">Contactos</a></li>
            </ul>
        </nav>
    </body>
</html>
